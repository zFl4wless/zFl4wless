name: 'Readme Generator'

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  readme:
    name: "Generate Readme"

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@master

      - uses: muesli/readme-scribe@master
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
        with:
          template: "templates/README.tpl.md"
          writeTo: "README.md"

      - uses: stefanzweifel/git-auto-commit-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          commit_message: Updates README.md (auto-generated)
          branch: main
          commit_user_name: zFl4wless
          commit_user_email: zfl4wless@users.noreply.github.com
          commit_author: zFl4wless <zfl4wless@users.noreply.github.com>